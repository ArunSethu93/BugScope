<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BugScope v4 — AI Website Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090e;--bg1:#0a0f18;--bg2:#0e1520;--bg3:#141d2b;--bg4:#1a2438;
  --bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.12);--bdr3:rgba(255,255,255,.18);
  --txt:#e0e7f1;--txt2:#8892a4;--txt3:#4a5568;
  --acc:#00ffa3;--acc2:#00d68f;--acc-d:rgba(0,255,163,.08);--acc-g:rgba(0,255,163,.18);
  --danger:#ff4757;--warn:#ffa502;--info:#3b82f6;--purple:#a855f7;--cyan:#06b6d4;
  --glass:rgba(14,21,32,.72);--glass2:rgba(14,21,32,.88);
  --mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;
  --r:10px;--r2:14px;--r3:18px;
  --ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--mono);min-height:100vh;overflow-x:hidden}
::selection{background:var(--acc);color:var(--bg)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

/* ═══ CANVAS & AMBIENT ═══ */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4}
.scan-line{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);z-index:1;pointer-events:none;animation:scanMove 6s linear infinite;opacity:.3}
@keyframes scanMove{0%{top:-2px;opacity:0}5%{opacity:.35}95%{opacity:.35}100%{top:100vh;opacity:0}}

.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,163,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,163,.015) 1px,transparent 1px);
  background-size:60px 60px;opacity:.5}

.top-progress{position:fixed;top:0;left:0;height:2px;width:0;background:linear-gradient(90deg,var(--acc),var(--cyan));z-index:999;transition:width .4s ease,opacity .4s;opacity:0;box-shadow:0 0 20px var(--acc)}
.top-progress.on{opacity:1}

/* ═══ TOAST ═══ */
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:600;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
.toast{background:var(--glass2);border:1px solid var(--bdr2);border-radius:12px;padding:.7rem 1rem;font-size:11px;color:var(--txt);display:flex;align-items:center;gap:9px;pointer-events:all;min-width:230px;max-width:350px;animation:toastIn .4s var(--bounce) both;backdrop-filter:blur(16px);box-shadow:0 10px 40px rgba(0,0,0,.5)}
.toast.out{animation:toastOut .3s var(--ease) both}
@keyframes toastIn{from{opacity:0;transform:translateX(30px) scale(.92)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1;transform:none}to{opacity:0;transform:translateX(30px) scale(.9)}}
.t-ico{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.t-ico.ok{background:rgba(0,255,163,.12);color:var(--acc)}
.t-ico.err{background:rgba(255,71,87,.12);color:var(--danger)}
.t-ico.inf{background:rgba(59,130,246,.12);color:var(--info)}

/* ═══ HEADER ═══ */
.header{position:sticky;top:0;z-index:200;background:var(--glass2);backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr)}
.header-in{max-width:1000px;margin:0 auto;padding:0 1.5rem;height:58px;display:flex;align-items:center;gap:1.25rem}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--acc),var(--cyan));border-radius:9px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.brand-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.2));border-radius:9px}
.brand-mark svg{position:relative;z-index:1}
.brand-name{font-family:var(--display);font-size:18px;font-weight:800;letter-spacing:-.5px}
.brand-name em{background:linear-gradient(135deg,var(--acc),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}
.brand-ver{font-size:8px;color:var(--txt3);background:var(--bg3);border:1px solid var(--bdr);border-radius:4px;padding:2px 6px;letter-spacing:.5px}

.h-nav{display:flex;gap:3px;flex:1}
.h-pill{font-size:10px;padding:5px 12px;border-radius:7px;color:var(--txt3);cursor:pointer;transition:all .25s;border:1px solid transparent;font-family:var(--mono);letter-spacing:.5px;position:relative}
.h-pill.active{color:var(--acc);background:var(--acc-d);border-color:rgba(0,255,163,.2)}
.h-pill:hover:not(.active){color:var(--txt2);border-color:var(--bdr);background:var(--bg3)}
.h-pill .pulse{position:absolute;top:4px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--acc);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

.h-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.h-status{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--txt3);padding:4px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:20px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc);animation:pulse 2s ease infinite}

.icon-btn{width:34px;height:34px;border:1px solid var(--bdr);border-radius:9px;background:transparent;color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
.icon-btn:hover:not(:disabled){border-color:var(--bdr2);color:var(--txt);background:var(--bg3);transform:translateY(-1px)}
.icon-btn:disabled{opacity:.3;cursor:not-allowed}
.icon-btn .badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:8px;background:var(--acc);color:var(--bg);font-size:8px;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 4px}
.icon-btn .badge.show{display:flex}

/* ═══ MAIN ═══ */
.app{position:relative;z-index:2}
.page{max-width:1000px;margin:0 auto;padding:0 1.5rem 4rem}

/* ═══ HERO ═══ */
.hero{padding:4rem 0 2rem;animation:heroIn .8s var(--ease) both}
@keyframes heroIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:9px;letter-spacing:3.5px;color:var(--acc);margin-bottom:1.4rem;padding:5px 14px;background:var(--acc-d);border:1px solid rgba(0,255,163,.15);border-radius:20px}
.eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:pulse 2s ease infinite}

.hero-title{font-family:var(--display);font-size:clamp(2.4rem,6.5vw,4.2rem);font-weight:800;line-height:1.02;letter-spacing:-2.5px;margin-bottom:1.2rem}
.hero-title .line1{display:block;animation:titleIn .6s var(--ease) .2s both}
.hero-title .line2{display:block;animation:titleIn .6s var(--ease) .35s both}
@keyframes titleIn{from{opacity:0;transform:translateX(-30px);filter:blur(4px)}to{opacity:1;transform:none;filter:blur(0)}}
.stroke{color:transparent;-webkit-text-stroke:1.5px var(--acc);position:relative}
.stroke::after{content:attr(data-text);position:absolute;left:0;top:0;color:transparent;-webkit-text-stroke:1.5px var(--cyan);filter:blur(8px);opacity:.4;pointer-events:none}

.hero-sub{font-size:13px;color:var(--txt2);line-height:1.8;max-width:500px;margin-bottom:2.2rem;animation:heroIn .6s var(--ease) .5s both}

/* ═══ SCAN CARD ═══ */
.scan-card{background:var(--glass);border:1px solid var(--bdr2);border-radius:var(--r3);padding:1.5rem;position:relative;overflow:hidden;backdrop-filter:blur(12px);transition:border-color .3s,box-shadow .3s;animation:heroIn .6s var(--ease) .6s both}
.scan-card:focus-within{border-color:rgba(0,255,163,.3);box-shadow:0 0 60px rgba(0,255,163,.06)}
.scan-glow{position:absolute;inset:0;border-radius:var(--r3);background:radial-gradient(ellipse at 50% -20%,var(--acc-g),transparent 60%);opacity:0;transition:opacity .5s;pointer-events:none}
.scan-card:focus-within .scan-glow{opacity:1}
.scan-corner{position:absolute;width:20px;height:20px;border:2px solid rgba(0,255,163,.15);pointer-events:none;transition:border-color .3s}
.scan-card:focus-within .scan-corner{border-color:rgba(0,255,163,.35)}
.sc-tl{top:8px;left:8px;border-right:none;border-bottom:none;border-radius:4px 0 0 0}
.sc-tr{top:8px;right:8px;border-left:none;border-bottom:none;border-radius:0 4px 0 0}
.sc-bl{bottom:8px;left:8px;border-right:none;border-top:none;border-radius:0 0 0 4px}
.sc-br{bottom:8px;right:8px;border-left:none;border-top:none;border-radius:0 0 4px 0}

.scan-row{display:flex;gap:8px;align-items:center;position:relative;z-index:1}
.input-ico{color:var(--txt3);flex-shrink:0;display:flex;transition:color .25s}
.scan-card:focus-within .input-ico{color:var(--acc)}
.scan-input{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:11px;color:var(--txt);font-family:var(--mono);font-size:13px;padding:12px 14px;outline:none;min-width:0;transition:border-color .25s,box-shadow .25s;caret-color:var(--acc)}
.scan-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,255,163,.08)}
.scan-input::placeholder{color:var(--txt3)}

.clear-btn{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--txt3);cursor:pointer;flex-shrink:0;transition:all .2s;opacity:0;pointer-events:none;background:transparent;border:none}
.clear-btn.show{opacity:1;pointer-events:all}
.clear-btn:hover{color:var(--txt);background:var(--bg3)}

.scan-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--acc),var(--cyan));color:var(--bg);border:none;border-radius:11px;padding:12px 26px;font-family:var(--display);font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:transform .15s,box-shadow .25s,filter .25s;position:relative;overflow:hidden;letter-spacing:.3px}
.scan-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.2));transition:opacity .3s;opacity:0}
.scan-btn:hover:not(:disabled)::before{opacity:1}
.scan-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,255,163,.25)}
.scan-btn:active:not(:disabled){transform:scale(.97)}
.scan-btn:disabled{filter:grayscale(1) brightness(.4);cursor:not-allowed;transform:none;box-shadow:none}
.scan-btn .spinner{display:none}
.scan-btn.scanning .label{display:none}
.scan-btn.scanning .spinner{display:flex}
.scan-btn.scanning .spinner svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.scan-prog{display:none;margin-top:1rem;position:relative;z-index:1}
.scan-prog.on{display:block;animation:fadeUp .3s var(--ease)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.step-msg{font-size:11px;color:var(--acc);margin-bottom:8px;min-height:16px;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.step-msg .step-icon{display:inline-flex;animation:spin 1s linear infinite;opacity:.6}
.prog-track{height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--cyan));border-radius:2px;width:0;transition:width .5s ease;position:relative}
.prog-fill::after{content:'';position:absolute;right:0;top:-1px;bottom:-1px;width:40px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));animation:shimmer 1.2s ease infinite}
@keyframes shimmer{0%{opacity:0}50%{opacity:1}100%{opacity:0}}

.error-bar{display:none;margin-top:1rem;padding:.7rem 1rem;background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.2);border-radius:10px;font-size:11px;color:#ff8080;position:relative;z-index:1}
.error-bar.on{display:block;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.quick-row{display:flex;align-items:center;gap:7px;margin-top:1rem;flex-wrap:wrap;position:relative;z-index:1}
.q-label{font-size:10px;color:var(--txt3)}
.ql{font-size:10px;font-family:var(--mono);color:var(--txt2);background:var(--bg3);border:1px solid var(--bdr);border-radius:7px;padding:5px 12px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.ql::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--acc-d),transparent);opacity:0;transition:opacity .25s}
.ql:hover{color:var(--acc);border-color:rgba(0,255,163,.25)}
.ql:hover::before{opacity:1}

/* ═══ RESULTS ═══ */
.results{display:none;flex-direction:column;gap:1rem;margin-top:2rem}
.results.on{display:flex}

/* ═══ PANEL ═══ */
.panel{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;backdrop-filter:blur(8px);transition:border-color .25s,transform .2s;animation:panelIn .5s var(--ease) both}
@keyframes panelIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.panel:hover{border-color:var(--bdr2)}
.panel:nth-child(1){animation-delay:.1s}
.panel:nth-child(2){animation-delay:.2s}
.panel:nth-child(3){animation-delay:.3s}

.p-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;cursor:pointer;user-select:none;gap:12px;border-bottom:1px solid transparent;transition:background .2s,border-color .2s}
.p-hdr.open{border-bottom-color:var(--bdr)}
.p-hdr:hover{background:rgba(255,255,255,.015)}
.ph-l{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.ph-r{display:flex;align-items:center;gap:8px;flex-shrink:0}

.ph-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.ph-ico.blue{background:rgba(59,130,246,.12);color:var(--info)}
.ph-ico.green{background:rgba(0,255,163,.1);color:var(--acc)}
.ph-ico.red{background:rgba(255,71,87,.1);color:var(--danger)}
.ph-ico.purple{background:rgba(168,85,247,.1);color:var(--purple)}

.ph-title{font-family:var(--display);font-size:13px;font-weight:700}
.ph-badge{font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:5px;letter-spacing:.5px;background:var(--bg3);color:var(--txt3);border:1px solid var(--bdr)}
.ph-badge.green{background:rgba(0,255,163,.08);color:var(--acc);border-color:rgba(0,255,163,.2)}
.ph-badge.danger{background:rgba(255,71,87,.08);color:var(--danger);border-color:rgba(255,71,87,.2)}
.ph-badge.warn{background:rgba(255,165,2,.08);color:var(--warn);border-color:rgba(255,165,2,.2)}
.ph-badge.info{background:rgba(59,130,246,.08);color:var(--info);border-color:rgba(59,130,246,.2)}

.ph-url{font-size:10px;color:var(--txt3);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-meta{font-size:11px;color:var(--acc)}

.hdr-btn{width:28px;height:28px;border:1px solid var(--bdr);border-radius:7px;background:transparent;color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.hdr-btn:hover{border-color:var(--bdr2);color:var(--txt);background:var(--bg3)}

.chev{width:28px;height:28px;border:1px solid var(--bdr);border-radius:7px;background:transparent;color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chev svg{transition:transform .3s var(--ease)}
.chev.closed svg{transform:rotate(-90deg)}
.chev:hover{border-color:var(--bdr2);color:var(--txt)}

.p-body{padding:1.2rem;overflow:hidden;max-height:9000px;transition:max-height .5s var(--ease),opacity .35s,padding .35s;opacity:1}
.p-body.closed{max-height:0;opacity:0;padding-top:0;padding-bottom:0}
.p-body.npad{padding:0}
.p-body.npad.closed{padding:0}

/* ═══ PREVIEW ═══ */
.chrome{background:var(--bg1);border-bottom:1px solid var(--bdr);padding:10px 14px;display:flex;align-items:center;gap:10px}
.chrome-dots{display:flex;gap:6px;flex-shrink:0}
.cd{width:11px;height:11px;border-radius:50%;transition:transform .2s}
.cd:hover{transform:scale(1.3)}
.cd-r{background:#ff5f57}.cd-y{background:#febc2e}.cd-g{background:#28c840}
.chrome-addr{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:5px 11px;font-size:11px;color:var(--acc);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:6px}
.chrome-addr .lock{color:var(--acc);opacity:.6}
.pv-viewport{position:relative;height:480px;background:var(--bg1)}
.pv-viewport iframe{width:100%;height:100%;border:none;display:block}
.pv-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);pointer-events:none}
.pv-overlay.hidden{display:none}
.pv-overlay p{font-size:12px;color:var(--txt3)}
.pv-blocked{color:var(--warn)!important}
.pv-link{font-size:11px;color:var(--acc);text-decoration:none;pointer-events:all;border-bottom:1px dashed rgba(0,255,163,.3);transition:border-color .2s}
.pv-link:hover{border-color:var(--acc)}

/* ═══ STATS DASHBOARD ═══ */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:1.2rem}
.kpi{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;position:relative;overflow:hidden;transition:all .25s;cursor:default}
.kpi:hover{border-color:var(--bdr2);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--kpi-c,var(--acc)),transparent);opacity:0;transition:opacity .25s}
.kpi:hover::before{opacity:1}
.kpi-lbl{font-size:8px;letter-spacing:1.5px;color:var(--txt3);margin-bottom:8px}
.kpi-val{font-family:var(--display);font-size:22px;font-weight:800;margin-bottom:3px;transition:color .3s}
.kpi-sub{font-size:10px;color:var(--txt3);margin-bottom:9px}
.kpi-bar{height:2px;background:rgba(255,255,255,.04);border-radius:1px;overflow:hidden}
.kpi-fill{height:100%;border-radius:1px;background:var(--kpi-c,var(--acc));width:0;transition:width 1.8s var(--ease)}

.chart-row{display:grid;grid-template-columns:280px 1fr;gap:9px;margin-bottom:1.2rem}
.chart-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;transition:border-color .2s}
.chart-card:hover{border-color:var(--bdr2)}
.card-title{font-size:8px;letter-spacing:1.5px;color:var(--txt3);margin-bottom:.75rem}
.radar-wrap{display:flex;align-items:center;justify-content:center}
#radarCanvas{max-width:100%}
.spark-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.spark-legend{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--txt3)}
.sl-dot{width:7px;height:7px;border-radius:50%;background:var(--acc)}
.spark-footer{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--txt2)}

.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.meta-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:.8rem 1rem;transition:border-color .2s}
.meta-card:hover{border-color:var(--bdr2)}
.meta-r{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03);gap:8px}
.meta-r.nb{border-bottom:none}
.mk{font-size:8px;letter-spacing:1px;color:var(--txt3);flex-shrink:0}
.mv{font-size:11px;color:var(--txt2);text-align:right}
.mv.green{color:var(--acc)}

/* ═══ BUG REPORT ═══ */
.mini-ring{position:relative;display:flex;align-items:center;justify-content:center}
.mini-score{position:absolute;font-family:var(--display);font-size:11px;font-weight:800;color:var(--acc)}

.score-hero{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--bdr)}
.big-ring{position:relative;width:120px;height:120px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.big-ring svg{position:absolute}
.big-score{position:relative;font-family:var(--display);font-size:34px;font-weight:800;z-index:1}
.big-label{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--txt3)}
.score-meta{flex:1;min-width:200px}
.score-domain{font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:4px}
.score-verdict{font-size:12px;margin-bottom:12px}
.score-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.pill{font-size:10px;font-family:var(--mono);padding:3px 10px;border-radius:20px}
.pill.danger{background:rgba(255,71,87,.08);color:var(--danger);border:1px solid rgba(255,71,87,.2)}
.pill.warn{background:rgba(255,165,2,.08);color:var(--warn);border:1px solid rgba(255,165,2,.2)}
.pill.info{background:rgba(59,130,246,.08);color:var(--info);border:1px solid rgba(59,130,246,.2)}

.score-actions{display:flex;gap:8px}
.sa-btn{font-size:10px;font-family:var(--mono);color:var(--txt3);background:var(--bg3);border:1px solid var(--bdr);border-radius:7px;padding:5px 14px;cursor:pointer;transition:all .2s}
.sa-btn:hover{color:var(--txt);border-color:var(--bdr2);background:var(--bg4)}

.summary-box{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;font-size:12px;color:var(--txt2);line-height:1.85;margin-bottom:1rem;position:relative;overflow:hidden}
.summary-box::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--acc),var(--cyan));border-radius:2px}

.filter-tabs{display:flex;align-items:center;gap:3px;margin-bottom:1rem;position:relative;border-bottom:1px solid var(--bdr);padding-bottom:0}
.ftab{font-size:10px;font-family:var(--mono);color:var(--txt3);background:transparent;border:none;border-radius:7px 7px 0 0;padding:7px 14px;cursor:pointer;transition:color .2s;position:relative;z-index:1}
.ftab.active{color:var(--acc)}
.ftab:hover:not(.active){color:var(--txt2)}
.ftab-track{position:absolute;bottom:-1px;left:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--cyan));border-radius:1px 1px 0 0;transition:left .3s var(--ease),width .3s var(--ease);pointer-events:none}

.bug-section{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);margin-bottom:.6rem;overflow:hidden;transition:border-color .2s}
.bug-section:hover{border-color:var(--bdr2)}
.bss-hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1rem;cursor:pointer;user-select:none;gap:8px;transition:background .15s}
.bss-hdr:hover{background:rgba(255,255,255,.015)}
.bss-l{display:flex;align-items:center;gap:9px}
.bss-r{display:flex;align-items:center;gap:8px}
.bs-ico{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono)}
.bs-ico.html{background:rgba(255,107,53,.1);color:#ff6b35}
.bs-ico.css{background:rgba(59,130,246,.1);color:var(--info)}
.bs-ico.js{background:rgba(255,165,2,.1);color:var(--warn)}
.bs-ico.be{background:rgba(168,85,247,.1);color:var(--purple)}
.bs-ico.sec{background:rgba(255,71,87,.1);color:var(--danger)}
.bs-name{font-family:var(--display);font-size:13px;font-weight:700}
.bs-count{font-size:10px;color:var(--txt3)}
.bs-chev{color:var(--txt3);display:flex;transition:transform .3s var(--ease)}
.bs-chev.open{transform:rotate(90deg)}
.bss-body{overflow:hidden;max-height:0;padding:0 1rem;transition:max-height .4s var(--ease),padding .3s}
.bss-body.open{max-height:4000px;padding-bottom:.5rem}

.bug-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.03);display:flex;gap:10px;align-items:flex-start;border-radius:6px;transition:all .15s}
.bug-item:hover{background:rgba(255,255,255,.015);padding-left:6px;padding-right:6px}
.bug-item:last-child{border-bottom:none}
.bug-item.hidden{display:none}
.sev{font-size:8px;font-family:var(--mono);font-weight:600;padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;letter-spacing:.8px;text-transform:uppercase}
.sev.critical{background:rgba(255,71,87,.08);color:var(--danger);border:1px solid rgba(255,71,87,.18)}
.sev.high{background:rgba(255,165,2,.08);color:var(--warn);border:1px solid rgba(255,165,2,.18)}
.sev.medium{background:rgba(59,130,246,.08);color:var(--info);border:1px solid rgba(59,130,246,.18)}
.sev.low{background:rgba(0,255,163,.06);color:var(--acc);border:1px solid rgba(0,255,163,.15)}
.bug-info{flex:1;min-width:0}
.bug-title{font-size:13px;font-weight:600;font-family:var(--display);margin-bottom:4px}
.bug-file{display:inline-block;font-family:var(--mono);font-size:9px;color:var(--acc);background:var(--acc-d);border:1px solid rgba(0,255,163,.15);border-radius:4px;padding:2px 7px;margin-bottom:6px}
.bug-desc{font-size:11px;color:var(--txt2);line-height:1.7}
.bug-fix{font-family:var(--mono);font-size:10px;color:var(--acc2);padding:6px 10px;margin-top:7px;background:rgba(0,255,163,.03);border-left:2px solid rgba(0,255,163,.2);border-radius:0 5px 5px 0;line-height:1.6}

/* ═══ DRAWER ═══ */
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.drawer-bg.on{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;bottom:0;width:360px;background:var(--glass2);backdrop-filter:blur(20px);border-left:1px solid var(--bdr2);z-index:401;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s var(--ease)}
.drawer.open{transform:translateX(0)}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.3rem 1.3rem 1rem;border-bottom:1px solid var(--bdr)}
.drawer-title{font-family:var(--display);font-size:15px;font-weight:700}
.drawer-x{width:30px;height:30px;border:1px solid var(--bdr);border-radius:8px;background:transparent;color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.drawer-x:hover{border-color:var(--bdr2);color:var(--txt)}
.drawer-body{flex:1;overflow-y:auto;padding:1rem}
.drawer-empty{font-size:11px;color:var(--txt3);text-align:center;padding:3rem 0}
.h-item{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:all .2s}
.h-item:hover{border-color:var(--acc-g);background:var(--bg4);transform:translateX(-2px)}
.hi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
